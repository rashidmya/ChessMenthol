name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

jobs:
  test:
    name: Frontend tests + typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci
      - name: Vitest
        working-directory: app
        run: npm run test
      - name: Typecheck
        working-directory: app
        run: npx tsc -p tsconfig.app.json --noEmit
      - name: Svelte check
        working-directory: app
        run: npx svelte-check --tsconfig ./tsconfig.app.json

  build-smoke:
    name: Tauri build smoke (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app/src-tauri -> target
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev \
            libpipewire-0.3-dev
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci
      - name: Provision Stockfish sidecar + net (host triple)
        working-directory: app
        run: node scripts/fetch-sidecar.mjs
      - name: Build (no bundle)
        working-directory: app
        run: npx tauri build --no-bundle
