name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            sidecars: 'aarch64-apple-darwin x86_64-apple-darwin'
          - platform: ubuntu-24.04
            args: ''
            sidecars: ''
          - platform: windows-latest
            args: ''
            sidecars: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app/src-tauri -> target

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libegl-dev \
            libwayland-dev \
            libdrm-dev \
            libxcb1-dev

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Provision Stockfish sidecar(s) + net
        working-directory: app
        run: node scripts/fetch-sidecar.mjs ${{ matrix.sidecars }}

      - name: Build and release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'ChessMenthol ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install ChessMenthol.'
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
